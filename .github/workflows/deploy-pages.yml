name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout labkit
        uses: actions/checkout@v4
        with:
          path: labkit

      # labkit's package.json uses file:../weasel dependencies, so weasel
      # must sit next to labkit in the workspace
      - name: Checkout weasel
        uses: actions/checkout@v4
        with:
          repository: orochi235/weasel
          path: weasel

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build weasel
        working-directory: weasel
        run: |
          npm ci
          npm run build

      - name: Install labkit
        working-directory: labkit
        run: npm ci

      - name: Build docs + Storybook
        working-directory: labkit
        run: npm run build:site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: labkit/docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
